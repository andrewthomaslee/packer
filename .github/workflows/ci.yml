name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  CI:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install Nix  
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Nix Cache
        uses: DeterminateSystems/flakehub-cache-action@main

      - name: Flake Checker
        uses: DeterminateSystems/flake-checker-action@main

      - name: Flake Check
        run: nix flake check --show-trace

      - name: Build Hcloud ext4 x86_64
        run: nix build .#hcloud-ext4-x86_64 --show-trace

      - name: Build AWS ext4 x86_64
        run: nix build .#aws-ext4-x86_64 --show-trace

      - name: Build Hcloud Packer
        run: nix build .#hcloud-ext4-aarch64-pkr-json --show-trace

      - name: Build AWS Packer
        run: nix build .#aws-ext4-aarch64-pkr-json --show-trace
      
      - name: Build MkDocs
        run: nix build .#documentation --show-trace

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: './result'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
        
      - name: Generate semver tag
        id: semver
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          TAG="0.1.${COMMIT_COUNT}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.semver.outputs.tag }} -m "Release ${{ steps.semver.outputs.tag }}" ${{ github.sha }}
          git push origin ${{ steps.semver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.semver.outputs.tag }}
          name: ${{ steps.semver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: public
          name: andrewthomaslee/packer
          rolling: true
          include-output-paths: true
        
