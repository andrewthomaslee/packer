name: CI

on:
  push:
    branches:
      - main

jobs:
  CI:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix  
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Nix Cache
        uses: DeterminateSystems/flakehub-cache-action@main

      - name: Flake Checker
        uses: DeterminateSystems/flake-checker-action@main

      - name: Build Hcloud ext4 x86_64
        run: nix build .#hcloud-ext4-x86_64 --show-trace

      - name: Build AWS ext4 x86_64
        run: nix build .#aws-ext4-x86_64 --show-trace
      
      - name: Build MkDocs
        run: nix build .#documentation --show-trace

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: './result'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Publish to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: public
          name: andrewthomaslee/packer
          rolling: true
          include-output-paths: true
